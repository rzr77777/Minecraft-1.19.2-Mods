
#Click Mod Configuration
[general]

	#Entity Stats
	[general.stats]
		#Whether the entity can damage the player. Default: true
		entityCausesDamage = true
		#Amount of damage the entity deals when attacking. Default: 8.0
		#Range: 1.0 ~ 20.0
		attackDamage = 8.0
		#Whether the entity flickers sporadically when spawned. Default: true
		flicker = true

	#Spawn Settings
	[general.spawn]
		#Chance (0.0 to 1.0) for a click sound to play when lighting conditions are met (night, cave, thick tree coverage, etc.). Default: 0.025
		#Range: 0.0 ~ 1.0
		spawnChance = 0.025
		#Number of ticks between spawn roll checks. 20 ticks = 1 second. Default: 200 (10 seconds)
		#Range: 1 ~ 12000
		spawnTickInterval = 200
		#Number of ticks before the entity despawns. 20 ticks = 1 second. Default: 200 (10 seconds)
		#Range: 20 ~ 800
		entityLifetimeTicks = 200
		#Number of times the click sound occurs before an entity spawns. Default: 3
		#Range: 1 ~ 20
		clicksBeforeSpawn = 3

	#Sound Settings
	[general.sounds]
		#Whether to play the ambient sound when the entity spawns. Default: true
		playAmbientSound = true

	#Logging Settings
	[general.logging]
		#Enable logging to console for debugging purposes. Default: false
		enableLogging = false

